build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

complexity:
  active: true
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 10
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  LongMethod:
    active: true
    threshold: 150
  LargeClass:
    active: true
    threshold: 600
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInObjects: 20
    thresholdInInterfaces: 15

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true
  MagicNumber:
    active: false
  ForbiddenComment:
    active: false
  WildcardImport:
    active: true
  ReturnCount:
    active: true
    max: 6
    excludedFunctions: ['equals']
    excludeLabeled: true

potential-bugs:
  active: true
  UnreachableCode:
    active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    active: false
  SwallowedException:
    active: false

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludes: ['**/test/**', '**/androidTest/**']
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
